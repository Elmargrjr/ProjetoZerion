<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="MediaQuery.css">
    <title>Zerion</title>
</head>
<body>

    <main>

        <div id="logo">
            <img src="LogoParaMobile.png" alt="">
        </div>

        <h1>Explore um novo universo social</h1>

        <section id="login">

            <h1>Conecte-se</h1>
            <h2>Conecte-se ao infinito e descubra novas pessoas, ideias e universos.</h2>

            <form action="">

                <div class="campo">
                    <input type="text" name="email" id="iemail" placeholder="Seu E-mail">
                    <label for="iemail">Email</label>
                </div>


                <div class="campo">
                    <input type="password" name="senha" id="isenha" placeholder="Sua senha">
                    <label for="isenha">Senha</label>
                </div>

                <button type="submit">Entrar</button>
                <a href="">Cadastrar</a>

            </form>

        </section>
        
      

    </main>
    
</body>
</html>
