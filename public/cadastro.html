<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/cadastro.css">
    <link rel="stylesheet" href="./css/MediaQuery.css">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zerion</title>
</head>
<body>

    <div class="galaxy"></div>
    <div class="stars"></div>

    <div class="stars stars-far"></div>
    <div class="stars stars-mid"></div>
    <div class="stars stars-near"></div>

    <main>

        <div id="logo">
            <img src="./img/LogoParaMobile.png" alt="">
        </div>

        <section id="login">

            <h1>Cadastro</h1>
            <h2>Entre na Zerion e comece sua jornada no universo digital.</h2>

            <form id="formCadastro" autocomplete="on">

                <div class="campo">
                    <label for="inome">Nome</label>
                    <input type="text" name="nome" id="inome" placeholder="Seu nome">
                </div>

                <div class="campo">
                    <label for="inum">Telefone</label>
                    <input type="tel" name="num" id="inum" placeholder="Número de celular">
                </div>

                <div class="campo">
                    <label for="iemail">Email</label>
                    <input type="text" name="email" id="iemail" placeholder="Seu E-mail">
                </div>

                <div class="campo">
                    <p>Gênero</p>
                    <select name="Sexo" id="isexo">
                        <option value="">Selecione</option>
                    <option value="male">Masculino</option>
                    <option value="female">Feminino</option>
                    <option value="other">Outro</option>
                    <option value="not-say">Prefiro não informar</option>
                    </select>
                </div>


                <div class="campo">
                    <label for="isenha">Senha</label>
                    <input type="password" name="senha" id="isenha" placeholder="Sua senha">
                </div>

                <div class="termos">
                    <input type="checkbox" id="termos" required>

                    <label for="termos">
                        Eu concordo com os 
                        <a href="./termos.html">Termos de Uso</a> 
                        e a 
                        <a href="./priv.html">Política de Privacidade</a>.
                    </label>
                </div>

                <button type="submit">Cadastrar</button>

            </form>

        </section>
        
    </main>
    <script src="/js/cadastro.js"></script>
</body>
</html>
