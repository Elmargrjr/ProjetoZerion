<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>
    <h1>Bem-vindo, <span id="nomeUsuario"></span></h1>

    <script>
        // Função para Curtir / Descurtir (Impulsionar)
        function toggleLike(btn) {
            const card = btn.closest('.post-card');
            const likeCountElement = card.querySelector('.like-count');
            let currentLikes = parseInt(likeCountElement.innerText);
            const icon = btn.querySelector('i');

            if (btn.classList.contains('liked')) {
                // Descurtir
                btn.classList.remove('liked');
                icon.className = 'fa-regular fa-star'; // Ícone vazio
                likeCountElement.innerText = currentLikes - 1;
            } else {
                // Curtir
                btn.classList.add('liked');
                icon.className = 'fa-solid fa-star'; // Ícone cheio
                likeCountElement.innerText = currentLikes + 1;
            }
        }

        // Abrir/Fechar Gaveta de Comentários
        function toggleComments(btn) {
            const card = btn.closest('.post-card');
            const commentSection = card.querySelector('.comments-section');
            
            if (commentSection.style.display === 'block') {
                commentSection.style.display = 'none';
                btn.classList.remove('comment-active');
            } else {
                commentSection.style.display = 'block';
                btn.classList.add('comment-active');
                card.querySelector('.comment-input-box input').focus(); // Foca no input automaticamente
            }
        }

        // Enviar Novo Comentário
        function adicionarComentario(btn) {
            const inputBox = btn.previousElementSibling;
            const commentText = inputBox.value.trim();

            if (commentText === '') return;

            const card = btn.closest('.post-card');
            const commentsList = card.querySelector('.comments-list');
            const commentCountElement = card.querySelector('.comment-count');

            // Criar o HTML do novo comentário
            const novoComentario = document.createElement('div');
            novoComentario.className = 'comment-item';
            novoComentario.innerHTML = `
                <div class="comment-user">Você (Tripulante)</div>
                ${commentText}
            `;

            // Adiciona no final da lista de comentários
            commentsList.appendChild(novoComentario);

            // Atualiza o contador de comentários da publicação
            let currentComments = parseInt(commentCountElement.innerText);
            commentCountElement.innerText = currentComments + 1;

            // Limpa o input
            inputBox.value = '';
        }

        // Criar Novo Post no Topo do Feed
        function transmitirDados() {
            const txtArea = document.getElementById('post-input');
            const texto = txtArea.value.trim();
            
            if (texto === '') {
                alert('Erro: Transmissão vazia abortada!');
                return;
            }

            const feed = document.getElementById('feed-container');
            const novoPost = document.createElement('div');
            novoPost.className = 'post-card';
            
            // Estrutura idêntica pronta com as funções injetadas via onClick
            novoPost.innerHTML = `
                <div class="post-user-info">
                    <div class="avatar" style="background: linear-gradient(135deg, var(--neon-ciano), var(--neon-magenta));">U</div>
                    <div class="user-details">
                        <div class="username">Você (Base)</div>
                        <div class="post-time"><i class="fa-solid fa-clock"></i> Sincronizado agora</div>
                    </div>
                </div>
                <div class="post-content">${texto.replace(/\n/g, '<br>')}</div>
                
                <div class="post-stats">
                    <span><i class="fa-solid fa-meteor"></i> <span class="like-count">0</span> impulsos</span>
                    <span><span class="comment-count">0</span> logs de resposta</span>
                </div>
                
                <div class="post-interactions">
                    <button class="action-btn" onclick="toggleLike(this)"><i class="fa-regular fa-star"></i>Impulsionar</button>
                    <button class="action-btn" onclick="toggleComments(this)"><i class="fa-regular fa-comment-dots"></i>Responder</button>
                    <button class="action-btn"><i class="fa-solid fa-satellite-dish"></i>Rebrotar</button>
                </div>

                <div class="comments-section">
                    <div class="comment-input-box">
                        <input type="text" placeholder="Escreva uma resposta estelar...">
                        <button class="btn-comment" onclick="adicionarComentario(this)">Enviar</button>
                    </div>
                    <div class="comments-list"></div>
                </div>
            `;
            
            feed.insertBefore(novoPost, feed.firstChild);
            txtArea.value = '';
        }
    </script>
</body>
</html>
