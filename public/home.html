<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerion</title>
    <link rel="stylesheet" href="css/style2.css">
    <script src="https://kit.fontawesome.com/ae3ae6f5a4.js" crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <a href="#" id="logo">
            <img src="img/LogoParaMobile.png" class="logo-img" alt="Zerion">
        </a>
        <div class="search-bar">
            <i class="fa-solid fa-satellite"></i>
            <input type="text" placeholder="Escanear galáxia...">
        </div>
    </header>

    <main>

        <!-- Criar Transmissão -->
        <div class="create-post">
            <div class="create-post-header">
                <div class="avatar">U</div>
                <textarea id="post-input" rows="3" placeholder="Iniciar nova transmissão para a rede..."></textarea>
            </div>
            <div class="create-post-actions">
                <div class="post-tools">
                    <button><i class="fa-solid fa-image"></i> Mídia</button>
                    <button><i class="fa-solid fa-terminal"></i> Log</button>
                </div>
                <button class="btn-publish" onclick="transmitirDados()">Transmitir</button>
            </div>
        </div>

        <!-- Feed -->
        <section id="feed-container" aria-label="Feed de publicações">

            <!-- Post de exemplo -->
            <article class="post-card">
                <div class="post-user-info">
                    <div class="avatar" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);">JV</div>
                    <div class="user-details">
                        <div class="username">Comandante Mendes</div>
                        <div class="post-time"><i class="fa-solid fa-clock"></i> 12 ano-luz atrás</div>
                    </div>
                </div>

                <div class="post-content">
                    Atualização do front-end do sistema Zerion concluída com sucesso. Ajustamos os propulsores de renderização e injetamos fusions de CSS na interface! 🪐✨
                </div>

                <img src="https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=600&q=80" alt="Nebulosa" class="post-media">

                <div class="post-stats">
                    <span><i class="fa-solid fa-meteor"></i> <span class="like-count">42</span> impulsos</span>
                    <span><span class="comment-count">1</span> logs de resposta</span>
                </div>

                <div class="post-interactions">
                    <button class="action-btn" onclick="toggleLike(this)">
                        <i class="fa-regular fa-star"></i> Impulsionar
                    </button>
                    <button class="action-btn" onclick="toggleComments(this)">
                        <i class="fa-regular fa-comment-dots"></i> Responder
                    </button>
                    <button class="action-btn">
                        <i class="fa-solid fa-satellite-dish"></i> Rebrotar
                    </button>
                </div>

                <div class="comments-section">
                    <div class="comment-input-box">
                        <input type="text" placeholder="Escreva uma resposta estelar...">
                        <button class="btn-comment" onclick="adicionarComentario(this)">Enviar</button>
                    </div>
                    <div class="comments-list">
                        <div class="comment-item">
                            <div class="comment-user">Sonda Voyager III</div>
                            Excelente trabalho na engenharia dos painéis visuais!
                        </div>
                    </div>
                </div>
            </article>

        </section>

    </main>

    <footer>
        <nav id="navegacao">
            <ul>
                <li><a href="#" title="Início"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="#" title="Buscar"><i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="#" title="Notificações"><i class="fa-solid fa-bell"></i></a></li>
                <li><a href="#" title="Perfil"><i class="fa-solid fa-user-astronaut"></i></a></li>
            </ul>
        </nav>
    </footer>

    <script src="js/home.js"></script>

</body>
</html>
