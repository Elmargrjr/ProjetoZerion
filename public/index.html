<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/MediaQuery.css">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zerion</title>
</head>
<body>

    <div class="galaxy"></div>
    <div class="stars"></div>

    <div class="stars stars-far"></div>
    <div class="stars stars-mid"></div>
    <div class="stars stars-near"></div>

    <main>

        <div id="logo">
            <img src="./img/LogoParaMobile.png" alt="">
        </div>

        <h1>Compartilhe seu universo.</h1>

        <section id="login">

            <h1>Conecte-se</h1>
            <h2>Explore novas ideias, comunidades e experiências em um universo sem limites.</h2>

            <form id="formLogin" autocomplete="on">

                <div class="campo">
                    <label for="iemail">Email</label>
                    <input type="text" name="email" id="iemail" placeholder="Seu E-mail">
                </div>


                <div class="campo">
                    <label for="isenha">Senha</label>
                    <input type="password" name="senha" id="isenha" placeholder="Sua senha">
                    <a href="#">
                        Esqueceu sua senha?
                    </a>
                </div>

                <button type="submit">Entrar</button>
                <a href="cadastro.html" class ="cadastro">Cadastrar</a>

            </form>

        </section>
        
    </main>
    <script src="/js/login.js"></script>
</body>
</html>
